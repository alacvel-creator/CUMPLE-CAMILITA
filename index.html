<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Invitación Cumpleaños #9: Camila Cortez</title>
    <meta property="og:title" content="¡Te invito a mi Cumpleaños #9! - Camila Cortez">
    <meta property="og:description" content="Jueves 16 de Abril | Mega Center Irpavi">
    <meta property="og:image" content="https://cumple-camilita-wl6f.vercel.app/fondo.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pandora-blue: #00d4ff;
            --deep-ocean: #050c16;
            --accent: #b4f0ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-ocean);
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 450px;
            /* URL completa para asegurar la carga en todos los dispositivos */
            background-image: url('https://cumple-camilita-wl6f.vercel.app/fondo.jpg'); 
            background-size: cover;
            background-position: center;
            height: 95vh;
            border-radius: 20px;
            border: 2px solid var(--pandora-blue);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            margin: 10px;
        }

        .overlay-bottom {
            background: linear-gradient(to top, 
                rgba(5, 12, 22, 1) 0%, 
                rgba(5, 12, 22, 0.95) 60%, 
                rgba(5, 12, 22, 0) 100%);
            padding: 40px 25px 30px 25px;
            text-align: center;
        }

        .details {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .highlight {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.3rem;
            display: block;
            text-shadow: 0 0 10px var(--pandora-blue);
        }

        .cinema-info {
            background: rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            line-height: 1.4;
            text-align: left;
        }

        .btn-confirm {
            display: block;
            background: var(--pandora-blue);
            color: var(--deep-ocean);
            padding: 18px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-confirm:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px var(--pandora-blue);
        }

        .footer-quote {
            font-size: 0.75rem;
            margin-top: 20px;
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="overlay-bottom">
            <div class="details">
                <span class="highlight">Jueves 16 de Abril | 17:00 Hrs</span>
                📍 <strong>Mega Center (Irpavi)</strong>
            </div>

            <div class="cinema-info">
                🍿 🎬 <strong>Misión Pandora:</strong> Terminada la función, pasaremos al salón para la merienda y el pastel. Estaremos hasta las 20:00.
            </div>

            <a href="https://wa.me/59167102521?text=¡Hola!%20Confirmo%20mi%20asistencia%20al%20cumpleaños%20de%20Camila%20Cortez.%20¡Ahí%20nos%20vemos!" class="btn-confirm">
                Confirmar Asistencia 💬
            </a>
            
            <p class="footer-quote">"Oel ngati kameie" - Te veo en el cine</p>
        </div>
    </div>

</body>
</html>
