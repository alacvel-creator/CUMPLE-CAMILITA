<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Invitación Cumpleaños #9: Camila Cortez</title>
    <meta property="og:title" content="¡Te invito a mi Cumpleaños #9! - Camila Cortez">
    <meta property="og:description" content="Jueves 16 de Abril | Mega Center Irpavi">
    <meta property="og:image" content="./fondo.jpg">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pandora-blue: #00d4ff;
            --deep-ocean: #050c16;
            --accent: #b4f0ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-ocean);
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 450px;
            /* El punto y la barra antes del nombre aseguran que busque en la misma carpeta */
            background-image: url('./fondo.jpg'); 
            background-size: cover;
            background-position: center;
            height: 95vh;
            border-radius: 20px;
            border: 2px solid var(--pandora-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            margin: 10px;
        }

        .overlay-top {
            background: linear-gradient(to bottom, rgba(5, 12, 22, 0.85) 0%, rgba(5, 12, 22, 0) 100%);
            padding: 35px 20px;
            text-align: center;
        }

        .overlay-bottom {
            background: linear-gradient(to top, rgba(5, 12, 22, 0.95) 40%, rgba(5, 12, 22, 0) 100%);
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--pandora-blue);
            margin: 0;
            text-shadow: 0 0 15px var(--pandora-blue);
        }

        .details {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .highlight {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 5px;
        }

        .btn-confirm {
            display: inline-block;
            background: rgba(0, 212, 255, 0.2);
            color: white;
            border: 2px solid var(--pandora-blue);
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .btn-confirm:hover {
            background: var(--pandora-blue);
            color: var(--deep-ocean);
            box-shadow: 0 0 30px var(--pandora-blue);
        }

        .cinema-info {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            font-size: 0.9rem;
            border-left: 5px solid var(--pandora-blue);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="overlay-top">
            <h1>Camila Cortez</h1>
            <p style="margin: 8px 0; letter-spacing: 3px; font-weight: 300;">¡MI CUMPLEAÑOS #9!</p>
        </div>

        <div class="overlay-bottom">
            <div class="details">
                <span class="highlight">Jueves 16 de Abril | 17:00 Hrs</span>
                📍 <strong>Mega Center (Irpavi)</strong>
            </div>

            <div class="cinema-info">
                🎬 Terminada la función, pasaremos al salón para una merienda y cantaremos el feliz cumpleaños hasta las 20:00.
            </div>

            <a href="https://wa.me/59167102521?text=¡Hola!%20Confirmo%20asistencia%20al%20cumpleaños%20de%20Camila%20Cortez" class="btn-confirm">
                CONFIRMAR ASISTENCIA 💬
            </a>
            
            <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.6;">
                "Oel ngati kameie" - Te veo en Pandora
            </p>
        </div>
    </div>

</body>
</html>
